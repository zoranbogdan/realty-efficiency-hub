<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Real Estate Marketing Automation Workflow</title>
  <desc id="desc">Cover illustration for real estate marketing automation workflow guide.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4faff"/>
      <stop offset="100%" stop-color="#edf8f2"/>
    </linearGradient>
    <style>
      .h1 { font: 700 50px Arial, sans-serif; fill: #13374f; }
      .h2 { font: 400 24px Arial, sans-serif; fill: #3b6279; }
      .card { fill: #fff; stroke: #2d6f95; stroke-width: 3; rx: 16; }
      .t { font: 700 27px Arial, sans-serif; fill: #13374f; }
      .s { font: 400 19px Arial, sans-serif; fill: #3b6279; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="90" y="108" class="h1">Real Estate Marketing Automation Workflow</text>
  <text x="90" y="150" class="h2">Guide to automate campaigns across email, social, ads, and CRM handoff</text>

  <rect x="90" y="240" width="450" height="210" class="card"/>
  <text x="130" y="310" class="t">Campaign Triggers</text>
  <text x="130" y="350" class="s">Audience segments and</text>
  <text x="130" y="380" class="s">behavior-based entry rules</text>

  <rect x="575" y="240" width="450" height="210" class="card"/>
  <text x="615" y="310" class="t">Multi-Channel Flow</text>
  <text x="615" y="350" class="s">Email, SMS, social, and ads</text>
  <text x="615" y="380" class="s">with synchronized timing</text>

  <rect x="1060" y="240" width="450" height="210" class="card"/>
  <text x="1100" y="310" class="t">Conversion Handoff</text>
  <text x="1100" y="350" class="s">Lead scoring, routing, and</text>
  <text x="1100" y="380" class="s">consultation booking tasks</text>

  <rect x="220" y="540" width="1160" height="250" class="card"/>
  <text x="270" y="615" class="t">Marketing automation should optimize for qualified opportunities</text>
  <text x="270" y="660" class="s">• Align campaign logic to pipeline stages</text>
  <text x="270" y="695" class="s">• Standardize creative and message templates</text>
  <text x="270" y="730" class="s">• Track source-to-consultation outcomes weekly</text>
</svg>
