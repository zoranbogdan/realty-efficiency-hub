<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">CRM Automation for Real Estate Teams</title>
  <desc id="desc">Cover illustration for real estate CRM automation workflow guide.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3f9ff"/>
      <stop offset="100%" stop-color="#ecf8f0"/>
    </linearGradient>
    <style>
      .h1 { font: 700 52px Arial, sans-serif; fill: #12364f; }
      .h2 { font: 400 24px Arial, sans-serif; fill: #3a6178; }
      .card { fill: #fff; stroke: #2d6f95; stroke-width: 3; rx: 16; }
      .t { font: 700 27px Arial, sans-serif; fill: #12364f; }
      .s { font: 400 19px Arial, sans-serif; fill: #3a6178; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="90" y="110" class="h1">CRM Automation for Real Estate Teams</text>
  <text x="90" y="152" class="h2">Workflow guide for routing, follow-up, qualification, and pipeline control</text>

  <rect x="90" y="240" width="450" height="210" class="card"/>
  <text x="130" y="310" class="t">Lead Intake</text>
  <text x="130" y="350" class="s">Source tags, required fields,</text>
  <text x="130" y="380" class="s">and owner assignment</text>

  <rect x="575" y="240" width="450" height="210" class="card"/>
  <text x="615" y="310" class="t">Automated Follow-Up</text>
  <text x="615" y="350" class="s">Immediate touch + branch logic</text>
  <text x="615" y="380" class="s">for hot/warm/long-term paths</text>

  <rect x="1060" y="240" width="450" height="210" class="card"/>
  <text x="1100" y="310" class="t">Pipeline Visibility</text>
  <text x="1100" y="350" class="s">SLA alerts, stage movement,</text>
  <text x="1100" y="380" class="s">and conversion reporting</text>

  <rect x="220" y="540" width="1160" height="250" class="card"/>
  <text x="270" y="615" class="t">Automation creates leverage when rules are explicit</text>
  <text x="270" y="660" class="s">• Define ownership and escalation paths</text>
  <text x="270" y="695" class="s">• Pause sequences when live conversations begin</text>
  <text x="270" y="730" class="s">• Optimize weekly with source-to-close metrics</text>
</svg>
