<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AI Lead Generation Tools for Realtors</title>
  <desc id="desc">Comparison visual for AI lead generation tools in real estate.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6fbff"/>
      <stop offset="100%" stop-color="#eef8f1"/>
    </linearGradient>
    <style>
      .h1 { font: 700 54px Arial, sans-serif; fill: #14364f; }
      .h2 { font: 400 24px Arial, sans-serif; fill: #3c6177; }
      .card { fill: #ffffff; stroke: #2d6f95; stroke-width: 3; rx: 16; }
      .t { font: 700 28px Arial, sans-serif; fill: #14364f; }
      .s { font: 400 20px Arial, sans-serif; fill: #3c6177; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="90" y="110" class="h1">AI Lead Generation Tools for Realtors</text>
  <text x="90" y="155" class="h2">Comparison by lead quality, speed-to-lead, and pipeline conversion fit</text>

  <rect x="90" y="240" width="440" height="220" class="card"/>
  <text x="130" y="310" class="t">Capture Quality</text>
  <text x="130" y="355" class="s">Intent signals, source tags,</text>
  <text x="130" y="387" class="s">and contact accuracy</text>

  <rect x="580" y="240" width="440" height="220" class="card"/>
  <text x="620" y="310" class="t">Follow-Up Speed</text>
  <text x="620" y="355" class="s">Routing and first response</text>
  <text x="620" y="387" class="s">timing reliability</text>

  <rect x="1070" y="240" width="440" height="220" class="card"/>
  <text x="1110" y="310" class="t">Cost-to-ROI</text>
  <text x="1110" y="355" class="s">Acquisition cost vs</text>
  <text x="1110" y="387" class="s">qualified opportunities</text>

  <rect x="220" y="540" width="1160" height="260" class="card"/>
  <text x="270" y="615" class="t">Lead generation tools only work with process discipline</text>
  <text x="270" y="665" class="s">• Define source-level routing rules</text>
  <text x="270" y="700" class="s">• Track quality by qualification and consultation rates</text>
  <text x="270" y="735" class="s">• Optimize weekly using conversion data</text>
</svg>
