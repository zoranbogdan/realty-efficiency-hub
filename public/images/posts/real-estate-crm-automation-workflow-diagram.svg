<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920" role="img" aria-labelledby="title desc">
  <title id="title">CRM automation workflow diagram for real estate teams</title>
  <desc id="desc">Diagram showing intake, routing, follow-up branches, and reporting loop.</desc>
  <defs>
    <style>
      .bg { fill: #f7fbff; }
      .node { fill: #fff; stroke: #1d5f85; stroke-width: 3; rx: 14; }
      .decision { fill: #edf9ff; stroke: #1d5f85; stroke-width: 3; }
      .title { font: 700 40px Arial, sans-serif; fill: #12344d; }
      .txt { font: 700 22px Arial, sans-serif; fill: #12344d; }
      .small { font: 400 18px Arial, sans-serif; fill: #355972; }
      .line { stroke: #1d5f85; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#1d5f85"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1400" height="920"/>
  <text class="title" x="70" y="85">CRM Automation Workflow</text>

  <rect class="node" x="510" y="130" width="380" height="100"/>
  <text class="txt" x="610" y="190">New Lead Intake</text>

  <rect class="node" x="510" y="285" width="380" height="100"/>
  <text class="txt" x="605" y="345">Assign + First Touch</text>

  <polygon class="decision" points="700,440 920,560 700,680 480,560"/>
  <text class="txt" x="595" y="555">Lead Engaged?</text>

  <rect class="node" x="90" y="740" width="350" height="130"/>
  <text class="txt" x="195" y="795">Hot Path</text>
  <text class="small" x="120" y="830">Immediate call + consult booking</text>

  <rect class="node" x="525" y="740" width="350" height="130"/>
  <text class="txt" x="635" y="795">Warm Path</text>
  <text class="small" x="555" y="830">Nurture + scheduled check-ins</text>

  <rect class="node" x="960" y="740" width="350" height="130"/>
  <text class="txt" x="1045" y="795">Long-Term</text>
  <text class="small" x="990" y="830">Monthly nurture + reactivation</text>

  <path class="line" d="M700 230 V275"/>
  <path class="line" d="M700 385 V430"/>
  <path class="line" d="M555 620 L280 730"/>
  <path class="line" d="M700 680 V730"/>
  <path class="line" d="M845 620 L1130 730"/>
</svg>
