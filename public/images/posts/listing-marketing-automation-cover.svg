<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Listing Marketing Automation System</title>
  <desc id="desc">Cover illustration for listing marketing automation workflow guide.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5faff"/>
      <stop offset="100%" stop-color="#edf9f3"/>
    </linearGradient>
    <style>
      .h1 { font: 700 52px Arial, sans-serif; fill: #14374f; }
      .h2 { font: 400 24px Arial, sans-serif; fill: #3b6279; }
      .card { fill: #fff; stroke: #2d6f95; stroke-width: 3; rx: 16; }
      .t { font: 700 27px Arial, sans-serif; fill: #14374f; }
      .s { font: 400 19px Arial, sans-serif; fill: #3b6279; }
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="90" y="110" class="h1">Listing Marketing Automation System</text>
  <text x="90" y="152" class="h2">Workflow for launching and managing listing campaigns from intake to reporting</text>

  <rect x="90" y="240" width="450" height="210" class="card"/>
  <text x="130" y="310" class="t">Listing Intake</text>
  <text x="130" y="350" class="s">Assets, details, compliance,</text>
  <text x="130" y="380" class="s">and timeline triggers</text>

  <rect x="575" y="240" width="450" height="210" class="card"/>
  <text x="615" y="310" class="t">Automated Launch</text>
  <text x="615" y="350" class="s">MLS, portals, social, email,</text>
  <text x="615" y="380" class="s">and ad task sequencing</text>

  <rect x="1060" y="240" width="450" height="210" class="card"/>
  <text x="1100" y="310" class="t">Performance Loop</text>
  <text x="1100" y="350" class="s">Engagement signals,</text>
  <text x="1100" y="380" class="s">follow-up, and optimization</text>

  <rect x="220" y="540" width="1160" height="250" class="card"/>
  <text x="270" y="615" class="t">Automate execution, keep strategy and review human-led</text>
  <text x="270" y="660" class="s">• Launch channel playbooks with role ownership</text>
  <text x="270" y="695" class="s">• Trigger updates when listing status changes</text>
  <text x="270" y="730" class="s">• Improve channel mix from weekly conversion data</text>
</svg>
